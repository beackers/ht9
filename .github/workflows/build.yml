name: Build the Project

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # setup
    - name: Checkout project sources
      uses: actions/checkout@v5
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    # validate and build
    - name: Generate Documents
      run: ./gradlew generateDocs
    - name: Validate Dictionaries
      run: ./gradlew validateLanguages
    - name: Build Languages
      run: ./gradlew buildDefinition buildDictionaryDownloads
    - name: Copy Downloads
      run: ./gradlew copyDownloadsToAssets
    - name: Lint
      run: ./gradlew lint # this actually runs mergeResources, so it must come after the dictionary tasks
    - name: Build 'Lite' and 'Full' APK variants
      run: ./gradlew assembleLiteRelease assembleFullRelease
    - name: Build debug APK variants
      if: github.event_name == 'pull_request'
      run: ./gradlew assembleLiteDebug assembleFullDebug
    - name: Upload debug APK artifact
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: |
          app/build/outputs/apk/lite/debug/*.apk
          app/build/outputs/apk/full/debug/*.apk
        if-no-files-found: error
